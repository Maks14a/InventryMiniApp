<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Iventry Album</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-container">

    <header class="app-header">
      <div class="brand-block">
        <div class="brand-logo">
          <img class="brand-logo-img" src="assets/eventry-logo.png" alt="Eventry" />
        </div>
        <div>
          <div class="brand-name">Eventry</div>
          <div id="topTitle" class="page-title">Альбомы</div>
        </div>
      </div>
      <button id="topMenuBtn" class="btn glass header-btn hidden">⚙️</button>
    </header>

    <div id="guestBanner" class="hidden">
      Ты открыт как <b>гость</b>. Для работы открой в Telegram.
    </div>

    <main id="screenAlbums">
      <div class="section-label">Ваши коллекции</div>
      <div id="albumsList"></div>
    </main>

    <main id="screenAlbum" class="hidden">
      <div class="nav-bar">
        <button id="backBtn" class="btn glass">← Назад</button>
        <div id="permBadge">...</div>
      </div>
      
      <div id="photoGrid"></div>

      <div class="bottom-toolbar glass">
        <div class="toolbar-grid">
          <button id="cameraBtn" class="btn toolbar-btn">

          <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="white"
          d="M9 2L7 4H4C2.9 4 2 4.9 2 6V20C2 21.1 2.9 22 4 22H20C21.1 22 22 21.1 22 20V6C22 4.9 21.1 4 20 4H17L15 2H9ZM12 18C9.8 18 8 16.2 8 14C8 11.8 9.8 10 12 10C14.2 10 16 11.8 16 14C16 16.2 14.2 18 12 18Z"/>
          </svg>

          </button>
          <button id="shareBtnBottom" class="btn toolbar-btn">

          <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="white"
          d="M18 16.1C17.24 16.1 16.56 16.39 16.04 16.86L8.91 12.7C8.96 12.47 9 12.24 9 12C9 11.76 8.96 11.53 8.91 11.3L15.96 7.19C16.5 7.7 17.22 8 18 8C19.66 8 21 6.66 21 5C21 3.34 19.66 2 18 2C16.34 2 15 3.34 15 5C15 5.24 15.04 5.47 15.09 5.7L8.04 9.81C7.5 9.3 6.78 9 6 9C4.34 9 3 10.34 3 12C3 13.66 4.34 15 6 15C6.78 15 7.5 14.7 8.04 14.19L15.16 18.36C15.11 18.57 15.08 18.78 15.08 19C15.08 20.66 16.42 22 18.08 22C19.74 22 21.08 20.66 21.08 19C21.08 17.34 19.74 16 18.08 16Z"/>
          </svg>

          </button>
        </div>
        <div id="uploadHint">Только просмотр</div>
      </div>
    </main>

  </div>

  <div id="fullModal" class="modal-overlay">
    <div class="modal-card">
      <div class="fs-controls">
        
        <button id="fullDownload" class="btn icon-btn">⬇️</button>
        <button id="fullDelete" class="btn icon-btn hidden">🗑</button>
        <button id="fullClose" class="btn icon-btn">✕</button>
      </div>

      <div id="fullViewer" style="width:100%; height:100%; overflow:hidden;">
        <div id="fullTrack"></div>
      </div>
      
      <div class="absolute bottom-4 w-full text-center text-xs opacity-50 pointer-events-none">
        Свайп — листать / Двойной тап — зум
      </div>
    </div>
  </div>

  <div id="cameraModal" class="modal-overlay">
    <div class="modal-card relative">
      <div class="cam-overlay-top">
        <button id="camFlip" class="btn glass icon-btn">🔄</button>
        <button id="cameraClose" class="btn glass icon-btn">✕</button>
      </div>

      <video id="camVideo" playsinline autoplay muted></video>
      <canvas id="camCanvas"></canvas>
      <div id="camPreview" class="hidden">
        <img id="previewImg">

        <div class="preview-actions">
          <button id="previewUpload">Загрузить</button>
          <button id="previewCancel">Удалить</button>
        </div>
      </div>

      <div class="cam-overlay-bottom">
        <button id="camShot" class="btn"> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <circle cx="12" cy="13" r="4"></circle> <path d="M4 7h4l2-2h4l2 2h4v12H4z"></path> </svg> </button>
        <div style="width: 60px"></div> </div>
    </div>
  </div>

  <div id="shareModal" class="modal-overlay">
    <div class="modal-card glass">
      <div class="modal-header">
        <span>📤 Доступ</span>
        <button id="shareClose" class="close-circle btn">✕</button>
      </div>

      <div class="action-list">
        <label class="setting-row">
          <div class="setting-text">
            <strong>Загрузка фото</strong>
            <span>Гость сможет добавлять</span>
          </div>
          <div>
            <input id="shareCanUpload" type="checkbox" checked>
            <span class="tg-switch"><span></span></span>
          </div>
        </label>

        <label class="setting-row">
          <div class="setting-text">
            <strong>Удаление</strong>
            <span>Гость сможет удалять</span>
          </div>
          <div>
            <input id="shareCanDelete" type="checkbox">
            <span class="tg-switch"><span></span></span>
          </div>
        </label>
      </div>

      <div style="margin-top: 10px;">
        <div class="text-xs opacity-50 mb-1">Лимит открытий (0 = ∞)</div>
        <div class="flex gap-2">
          <input id="shareMaxUses" type="number" value="20">
          <button id="shareNoLimit" class="btn glass" style="width:50px; border-radius:12px;">∞</button>
        </div>
      </div>

      <div class="action-list" style="margin-top: 10px;">
        <button id="shareLinkBtn" class="btn action-btn bg-white/5">🔗 Сгенерировать ссылку</button>
        <button id="sharePersonBtn" class="btn action-btn bg-white/5">👤 Выбрать человека</button>
      </div>
    </div>
  </div>

  <div id="manageModal" class="modal-overlay">
    <div class="modal-card glass">
      <div class="modal-header">
        <span>⚙️ Настройки</span>
        <button id="manageClose" class="close-circle btn">✕</button>
      </div>

      <div class="action-list">
        <button id="renameBtn" class="btn action-btn">✏️ Переименовать</button>
        <button id="membersBtn" class="btn action-btn">👥 Участники</button>
        <button id="leaveBtn" class="btn action-btn text-danger">🚪 Выйти</button>
        <button id="deleteAlbumBtn" class="btn action-btn text-danger">🗑 Удалить альбом</button>
      </div>
      
    </div>
  </div>

  <div id="membersModal" class="modal-overlay">
    <div class="modal-card glass" style="max-height: 80vh; overflow-y:auto;">
      <div class="modal-header">
        <span>👥 Участники</span>
        <button id="membersClose" class="close-circle btn">✕</button>
      </div>

      <div id="membersOwnerHint" class="text-xs opacity-50 p-2 bg-white/5 rounded"></div>
      <button id="leaveBtnInside" class="btn action-btn text-danger hidden mb-3">🚪 Выйти</button>

      <div id="membersAddBox">
        <div class="text-sm font-bold opacity-70 mb-2">Настройки новых приглашений</div>
        <div class="text-xs opacity-40 mb-2">Используйте меню "Поделиться" для создания ссылок с правами.</div>
      </div>

      <div class="section-label mt-4">Список</div>
      <div id="membersList" class="flex flex-col gap-2"></div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
</body>
</html>
